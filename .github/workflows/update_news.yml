name: Update SRO Intelligence News & Reports

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news-and-reports:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
      PROXIMITY_RADIUS_KM: ${{ secrets.PROXIMITY_RADIUS_KM || '50' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git fetch origin
          git pull origin "${GITHUB_REF_NAME}" --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install from requirements.txt if present
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Belt-and-braces: ensure these core libs are present even if requirements.txt path/contents change
          pip install feedparser folium requests beautifulsoup4

      - name: Run news ingest (RSS -> public/data/news.json)
        run: python scripts/news_agent.py

      - name: Generate proximity alerts + daily reports
        run: python scripts/generate_reports.py

      # ===== NEW: Mirror public outputs into the site root so Pages publishes /data/news.json =====
      - name: Mirror public outputs to site root
        run: |
          # ensure destination directories exist
          mkdir -p data
          mkdir -p reports
          # copy generated public outputs into repo root folders expected by the front-end
          cp -a public/data/* data/ || true
          cp -a public/reports/* reports/ || true
      # ============================================================================================

      - name: Stage updated artifacts
        run: |
          # add both the generated public outputs and the mirrored site-root files
          git add public/data/news.json || true
          git add public/data/proximity.json || true
          git add public/reports/ || true
          git add data/news.json || true
          git add data/proximity.json || true
          git add reports/ || true

      - name: Commit changes
        run: |
          git config user.name "sro-intel-bot"
          git config user.email "sro-intel-bot@users.noreply.github.com"
          git commit -m "Auto-update: SRO Intel Feed" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push origin "${GITHUB_REF_NAME}"

      - name: Trigger Worker KV update
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "secret: ${INGEST_SECRET}" \
            "https://osinfohub.vssmaximus.workers.dev/api/admin/ingest")
          echo "Worker ingest trigger status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Worker ingest returned HTTP $STATUS (expected 200)"
          fi
