name: Update Global Fuel Prices

on:
  schedule:
    - cron: "0 0,12 * * *"   # every 12 hours — 00:00 UTC and 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git fetch origin
          git pull origin "${GITHUB_REF_NAME}" --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      - name: Scrape global fuel prices
        run: python scripts/update_fuel_prices.py

      - name: Mirror to site root data folder
        run: |
          mkdir -p data
          cp public/data/fuel_prices.json data/fuel_prices.json || true

      - name: Stage artifacts
        run: |
          git add public/data/fuel_prices.json || true
          git add data/fuel_prices.json || true

      - name: Commit changes
        run: |
          git config user.name "sro-intel-bot"
          git config user.email "sro-intel-bot@users.noreply.github.com"
          git commit -m "Auto-update: Global fuel prices" || echo "No changes to commit"

      - name: Push changes
        run: |
          git pull origin "${GITHUB_REF_NAME}" --rebase -X theirs
          git push origin "${GITHUB_REF_NAME}"
