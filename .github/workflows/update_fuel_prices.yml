name: Update Global Fuel Prices

on:
  schedule:
    - cron: "0 6,18 * * *"   # twice daily — 06:00 UTC and 18:00 UTC (every 12 hours)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git fetch origin
          git pull origin "${GITHUB_REF_NAME}" --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape global fuel prices
        run: python scripts/update_fuel_prices.py

      - name: Mirror to site root data folder
        run: |
          mkdir -p data
          cp public/data/fuel_prices.json data/fuel_prices.json

      - name: Commit and push
        run: |
          git config user.name "sro-intel-bot"
          git config user.email "sro-intel-bot@users.noreply.github.com"
          git add public/data/fuel_prices.json data/fuel_prices.json
          git commit -m "Auto-update: Global fuel prices" || echo "No changes to commit"
          git pull origin "${GITHUB_REF_NAME}" --rebase -X theirs
          git push origin "${GITHUB_REF_NAME}"
